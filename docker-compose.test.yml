# =============================================================================
# OmniMind — Test Stack (isolated, ephemeral)
# Usage: docker compose -f docker-compose.test.yml up --build \
#          --abort-on-container-exit --exit-code-from backend
# =============================================================================

name: omnimind-test

networks:
  testnet:
    driver: bridge

services:

  postgres-test:
    image: postgres:16-alpine
    networks: [testnet]
    environment:
      POSTGRES_USER: omnimind_test
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: omnimind_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omnimind_test -d omnimind_test"]
      interval: 3s
      timeout: 3s
      retries: 15
      start_period: 5s
    tmpfs:
      - /var/lib/postgresql/data

  redis-test:
    image: redis:7-alpine
    networks: [testnet]
    command: redis-server --appendonly no
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s

  backend:
    build:
      context: ./backend
      target: development
    networks: [testnet]
    environment:
      ENVIRONMENT: test
      DATABASE_URL: postgresql+asyncpg://omnimind_test:test_password@postgres-test:5432/omnimind_test
      REDIS_URL: redis://redis-test:6379/1
      REDIS_PASSWORD: ""
      SECRET_KEY: test-secret-key-not-for-production-use-only
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "15"
      REFRESH_TOKEN_EXPIRE_DAYS: "7"
      CORS_ORIGINS: '["http://localhost:3000"]'
      ALLOWED_HOSTS: '["localhost","127.0.0.1"]'
      BCRYPT_ROUNDS: "4"
      LOG_LEVEL: WARNING
    volumes:
      - ./backend:/app
    command: pytest -v --tb=short
    depends_on:
      postgres-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
    restart: "no"
