apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: omnimind-staging
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: omnimind
  source:
    repoURL: https://github.com/AlexBoyev/OmniMind.git
    targetRevision: master
    path: k8s/overlays/staging
  destination:
    server: https://kubernetes.default.svc
    namespace: omnimind-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
